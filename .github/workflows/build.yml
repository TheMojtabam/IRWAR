name: Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Init go.sum
        run: go mod tidy

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o slipstream-panel ./cmd/panel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slipstream-panel-linux-amd64
          path: slipstream-panel
          retention-days: 30
